<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .book-container {
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
            max-height: 95vh;
        }

        .page {
            background-color: #f5f0e8;
            overflow: hidden;
            border: 1px solid #d4c5a9;
        }

        /* Estilo para las páginas transparentes */
        .page.transparent {
            background-color: transparent !important;
            border: none !important;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>

    <div id="book" class="book-container">
        
        <!-- PÁGINA TRANSPARENTE INICIAL -->
        <div class="page transparent"></div>

        <!-- PORTADA -->
        <div class="page">
            <img src="1.jpg" alt="">
        </div>

        <!-- Páginas 002-024 -->
        <div class="page"><img src="2.jpg" alt="Página 2"></div>
        <div class="page"><img src="3.jpg" alt="Página 3"></div>
        <div class="page"><img src="4.jpg" alt="Página 4"></div>
        <div class="page"><img src="5.jpg" alt="Página 5"></div>
        <div class="page"><img src="6.jpg" alt="Página 6"></div>
        <div class="page"><img src="7.jpg" alt="Página 7"></div>
        <div class="page"><img src="8.jpg" alt="Página 8"></div>
        <div class="page"><img src="9.jpg" alt="Página 9"></div>
        <div class="page"><img src="10.jpg" alt="Página 10"></div>
        <div class="page"><img src="11.jpg" alt="Página 11"></div>
        <div class="page"><img src="12.jpg" alt="Página 12"></div>
        <div class="page"><img src="13.jpg" alt="Página 13"></div>
        <div class="page"><img src="14.jpg" alt="Página 14"></div>
        <div class="page"><img src="15.jpg" alt="Página 15"></div>
        <div class="page"><img src="16.jpg" alt="Página 16"></div>
        <div class="page"><img src="17.jpg" alt="Página 17"></div>
        <div class="page"><img src="18.jpg" alt="Página 18"></div>
        <div class="page"><img src="19.jpg" alt="Página 19"></div>
        <div class="page"><img src="20.jpg" alt="Página 20"></div>
        <div class="page"><img src="21.jpg" alt="Página 21"></div>
        <div class="page"><img src="22.jpg" alt="Página 22"></div>
        <div class="page"><img src="23.jpg" alt="Página 23"></div>
        <div class="page"><img src="24.jpg" alt="Página 24"></div>

        <!-- PÁGINA TRANSPARENTE FINAL -->
        <div class="page transparent"></div>

    </div>

    <!-- Librería Page-Flip -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const bookElement = document.getElementById('book');

            // Inicializar el libro
            const pageFlip = new St.PageFlip(bookElement, {
                width: 350,
                height: 610,
                size: 'stretch',
                minWidth: 200,
                maxWidth: 800,
                minHeight: 350,
                maxHeight: 1400,
                maxShadowOpacity: 0.6,
                showCover: false,
                mobileScrollSupport: false,
                flippingTime: 800,
                usePortrait: false,
                startPage: 0,
                autoSize: true
            });

            // Cargar páginas desde el HTML
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            // Navegación con teclado
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    pageFlip.flipPrev();
                } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
                    pageFlip.flipNext();
                }
            });
        });
    </script>
</body>
</html>
